name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BUNDLE_WITHOUT: development
    strategy:
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4'] 
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: bundle exec rspec --format progress
      # Golden suite (v2): IR + codegen snapshots, plus runtime execution and
      # Ruby/JS bit-identical parity. Replaces the old `golden test` (v1).
      - run: bundle exec bin/kumi golden_v2 verify
