inherit_from: .rubocop_todo.yml

inherit_mode:
  merge:
    - Exclude

plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false
  Exclude:
    - 'bin/*'
    - 'cmd/**/*'
    - 'coverage/**/*'
    - 'examples/**/*'
    - 'golden/**/*'
    - 'pkg/**/*'
    - 'spec/fixtures/**/*'
    - 'tmp/**/*'
    - 'vendor/**/*'
    - 'vscode-extension/**/*'

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Style/OpenStructUse:
  Enabled: false

Naming/VariableNumber:
  Enabled: false

Layout/LineLength:
  Max: 150

# Pass bodies legitimately carry long dispatch methods; relaxed only there.
Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'lib/kumi/core/analyzer/passes/**/*'
    - 'lib/kumi/ir/**/*'
    - 'spec/**/*'

Metrics/AbcSize:
  Max: 20
  Exclude:
    - 'lib/kumi/core/analyzer/passes/**/*'
    - 'lib/kumi/ir/**/*'
    - 'spec/**/*'

Metrics/CyclomaticComplexity:
  Max: 10
  Exclude:
    - 'lib/kumi/core/analyzer/passes/**/*'
    - 'lib/kumi/ir/**/*'

Metrics/PerceivedComplexity:
  Max: 10
  Exclude:
    - 'lib/kumi/core/analyzer/passes/**/*'
    - 'lib/kumi/ir/**/*'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

Metrics/ParameterLists:
  Max: 6

Lint/MissingSuper:
  Exclude:
    - 'lib/kumi/core/analyzer/passes/pass_base.rb'

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Max: 30

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/VerifiedDoubleReference:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/IdenticalEqualityAssertion:
  Enabled: false

RSpec/PendingWithoutReason:
  Enabled: false
