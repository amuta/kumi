kernels:
  - id: abs:javascript:v1
    fn: core.abs
    inline: "= Math.abs($0)"

  - id: sqrt:javascript:v1
    fn: core.sqrt
    inline: "= Math.sqrt($0)"

  - id: sin:javascript:v1
    fn: core.sin
    inline: "= Math.sin($0)"

  - id: cos:javascript:v1
    fn: core.cos
    inline: "= Math.cos($0)"

  - id: exp:javascript:v1
    fn: core.exp
    inline: "= Math.exp($0)"

  - id: log:javascript:v1
    fn: core.log
    inline: "= Math.log($0)"

  - id: tanh:javascript:v1
    fn: core.tanh
