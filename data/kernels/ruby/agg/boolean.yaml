kernels:
  - id: any:ruby:v1
    fn: agg.any
    impl: "(a, b)\n  a || b"
    inline: "= $0 || $1"
    fold_inline: "= $0.any?"
    # The identity for a boolean OR reduction is `false`.
    # `any?` of an empty list is correctly `false`.
    identity:
      boolean: false

  - id: all:ruby:v1
    fn: agg.all
    impl: "(a, b)\n  a && b"
    inline: "= $0 && $1"
    fold_inline: "= $0.all?"
    # The identity for a boolean AND reduction is `true`.
    # `all?` of an empty list is correctly `true`.
    identity:
      boolean: true

  - id: none:ruby:v1
    fn: agg.none
    impl: "(a, b)\n  a || b"
    inline: "= $0 || $1"
    fold_inline: "= $0.none?"
    identity:
      boolean: false
    finalize: "= !$0"